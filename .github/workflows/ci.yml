# CI — runs on every pull request
# Purpose: gate merges with a fast lint + build check across all apps.
# Turbo's build cache means unchanged packages are skipped automatically.

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Cache Turbo's local build cache between CI runs
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm check

      - name: Build all apps
        run: pnpm build -- --cache-dir=.turbo
